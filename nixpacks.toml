[phases.setup]
nixPkgs = ["nodejs_18"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@8.15.6 --activate", "pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
